<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        .container {
            width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px #ccc;
        }

        h1 {
            text-align: center;
        }

        input, select {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
        }

        .addBtn { background: #28a745; color: white; }
        .editBtn { background: orange; color: white; }
        .deleteBtn { background: red; color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            background: #f2f2f2;
        }

        .pagination {
            margin-top: 15px;
            text-align: center;
        }

        .pageBtn {
            margin: 3px;
            background: #007bff;
            color: white;
        }

        .activePage {
            background: black !important;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🎓 Student Management System</h1>
    <form id="studentForm">
        <input type="hidden" id="studentId">
        <input type="text" id="name" placeholder="Student Name">
        <input type="number" id="age" placeholder="Age">
        <select id="grade">
            <option value="">Select Grade</option>
            <option>A</option>
            <option>B</option>
            <option>C</option>
        </select>
        <button type="submit" class="addBtn">Save Student</button>
    </form>
    <input type="text" id="searchInput" placeholder="Search by Name">
    <select id="filterGrade">
        <option value="">Filter by Grade</option>
        <option>A</option>
        <option>B</option>
        <option>C</option>
    </select>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Grade</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>

    <div class="pagination"></div>
</div>
<script src="script1.js"></script>
</body>
</html>
